<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stardance — Image of the Day</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a class="logo" href="index.html">✦ Henry's Stardance Project</a>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="launches.html">Launches</a>
    <a href="asteroids.html">Asteroids</a>
    <a href="image.html">Image of the Day</a>
  </div>
</nav>

<main>
  <section>
    <h2>🌌 Astronomy picture of the day</h2>
    <p class="sub">NASA's featured image. Loads the latest by default — or pick any date back to 1995.</p>
    <div class="keybar">
      <input type="date" id="apodDate">
      <button id="apodGo">Load date</button>
      <button class="ghost" id="apodLatest">Latest</button>
    </div>
    <div id="apodArea"><p class="loading">Loading image…</p></div>
  </section>
</main>

<footer>Built for the Stardance challenge · Data: NASA APOD</footer>

<script src="stars.js"></script>
<script src="app.js"></script>
<script>
/* date = "" loads the latest available image; a date string loads that day. */
async function loadApod(date){
  const area = document.getElementById("apodArea");
  area.innerHTML = `<p class="loading">Loading image…</p>`;
  try{
    const url = `https://api.nasa.gov/planetary/apod?api_key=${getApiKey()}${date ? "&date=" + date : ""}`;
    const res = await fetch(url);
    const a = await res.json();

    // NASA returns an error object (with .code / .msg) if the date has no image yet
    if (a.code || a.error || !a.url){
      const msg = a.msg || (a.error && a.error.message) || "No image available for that date yet.";
      area.innerHTML = `<div class="panel"><p class="loading">${msg}</p>
        <p class="hint">Tip: today's image may not be published yet — try "Latest" or an earlier date.</p></div>`;
      return;
    }

    const media = a.media_type === "image"
      ? `<a href="${a.hdurl || a.url}" target="_blank"><img src="${a.url}" alt="${a.title}"></a>`
      : `<iframe src="${a.url}" style="width:100%;height:320px;border:0;border-radius:12px;" allowfullscreen></iframe>`;

    area.innerHTML = `
      <div class="panel apod">
        <div>${media}</div>
        <div>
          <h3 style="margin:0 0 6px;">${a.title}</h3>
          <p class="meta" style="color:var(--muted); margin:0 0 10px;">${a.date}${a.copyright ? " · © " + a.copyright.trim() : ""}</p>
          <p style="font-size:14px;">${a.explanation}</p>
        </div>
      </div>`;
  }catch(err){
    area.innerHTML = `<div class="panel"><p class="loading">Couldn't load the image. If you've hit the demo-key limit, add your own key on the Home page.</p></div>`;
  }
}

const today = new Date().toISOString().slice(0, 10);
const dateInput = document.getElementById("apodDate");
dateInput.value = today;
dateInput.max = today;
dateInput.min = "1995-06-16"; // first ever APOD

document.getElementById("apodGo").addEventListener("click", () => loadApod(dateInput.value));
document.getElementById("apodLatest").addEventListener("click", () => loadApod(""));

// Default: load the latest available image (avoids "today not published yet" errors)
loadApod("");
</script>
</body>
</html>
